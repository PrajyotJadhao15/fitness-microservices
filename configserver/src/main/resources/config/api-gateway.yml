eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka:8761/eureka/

spring:
  application:
    name: api-gateway

  redis:
    host: redis
    port: 6379

  cloud:
    gateway:
      routes:

        # =========================
        # USER SERVICE
        # =========================
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
                key-resolver: "#{@userKeyResolver}"

        # =========================
        # ACTIVITY SERVICE
        # =========================
        - id: activity-service
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/api/activities/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
                key-resolver: "#{@userKeyResolver}"

        # =========================
        # AI SERVICE
        # =========================
        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/api/recommendations/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 4
                key-resolver: "#{@userKeyResolver}"

        # =========================
        # SWAGGER DOCS ROUTES
        # =========================
        - id: user-service-docs
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/v3/api-docs

        - id: activity-service-docs
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/activity-service/v3/api-docs

        - id: ai-service-docs
          uri: lb://AI-SERVICE
          predicates:
            - Path=/ai-service/v3/api-docs

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /user-service/v3/api-docs

      - name: Activity Service
        url: /activity-service/v3/api-docs

      - name: AI Service
        url: /ai-service/v3/api-docs